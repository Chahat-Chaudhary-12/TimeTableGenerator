
<div id="page-generate" class="page">

  <div class="generate-panel">
    <h2>Generate Timetable</h2>
    <p>Configure and run the scheduling engine. Choose your algorithm and constraints below.</p>
    <div class="generate-options">
      <div class="gen-option selected">
        <span class="icon">🧬</span>
        <span>Genetic</span>
      </div>
      <div class="gen-option">
        <span class="icon">🎲</span>
        <span>Greedy</span>
      </div>
      <div class="gen-option">
        <span class="icon">🔁</span>
        <span>Backtrack</span>
      </div>
      <div class="gen-option">
        <span class="icon">❄️</span>
        <span>Sim. Anneal</span>
      </div>
    </div>
    <button class="btn btn-primary" style="font-size:14px;padding:12px 32px">⚡ Run Generator</button>
  </div>

  <div class="grid-2">

    
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Constraints</span></div>
      <div class="panel-body">
        <div style="display:flex;flex-direction:column;gap:12px">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px">
            <input type="checkbox" checked style="accent-color:var(--accent)"> No teacher overlap
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px">
            <input type="checkbox" checked style="accent-color:var(--accent)"> No room double-booking
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px">
            <input type="checkbox" checked style="accent-color:var(--accent)"> Labs require lab rooms
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px">
            <input type="checkbox" checked style="accent-color:var(--accent)"> Respect hours/week
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px">
            <input type="checkbox" style="accent-color:var(--accent)"> Avoid early morning labs
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px">
            <input type="checkbox" style="accent-color:var(--accent)"> Balance teacher load
          </label>
        </div>
      </div>
    </div>

    
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Parameters</span></div>
      <div class="panel-body">
        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="form-group">
            <label>Output Version</label>
            <input value="output_v2">
          </div>
          <div class="form-group">
            <label>Max Iterations</label>
            <input type="number" value="1000">
          </div>
          <div class="form-group">
            <label>Sections to Generate</label>
            <select>
              <option>All Sections (A–H)</option>
              <option>Section A only</option>
              <option>Sections A–D</option>
            </select>
          </div>
          <div class="form-group">
            <label>Days per Week</label>
            <select>
              <option>6 days (Mon–Sat)</option>
              <option>5 days (Mon–Fri)</option>
            </select>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
