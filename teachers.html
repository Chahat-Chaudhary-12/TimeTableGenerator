<div id="page-teachers" class="page">

  <!-- Add Teacher Form -->
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-header"><span class="panel-title">Add Teacher</span></div>
    <div class="panel-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Teacher ID</label>
          <input placeholder="Auto-assigned">
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input placeholder="e.g. Dr. Ashish Garg">
        </div>
        <div class="form-group">
          <label>Department</label>
          <input value="CSE">
        </div>
        <div class="form-group">
          <label>Max Hours/Week</label>
          <input type="number" placeholder="20">
        </div>
      </div>
      <div style="margin-top:16px;display:flex;gap:8px">
        <button class="btn btn-primary">+ Add Teacher</button>
        <button class="btn btn-ghost">Clear</button>
      </div>
    </div>
  </div>
