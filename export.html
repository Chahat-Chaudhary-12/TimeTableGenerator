
<div id="page-export" class="page">

  <div class="panel">
    <div class="panel-header"><span class="panel-title">Export Timetables</span></div>
    <div class="panel-body">

      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:4px">Master Schedule</div>
            <div style="font-size:11px;color:var(--muted)">All sections combined CSV</div>
          </div>
          <button class="btn btn-success">⬇ CSV</button>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:4px">Teacher Schedule</div>
            <div style="font-size:11px;color:var(--muted)">Per-teacher view CSV</div>
          </div>
          <button class="btn btn-success">⬇ CSV</button>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:4px">Section A–H (All)</div>
            <div style="font-size:11px;color:var(--muted)">Individual section CSVs (8 files)</div>
          </div>
          <button class="btn btn-success">⬇ ZIP</button>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:4px">Room Utilization</div>
            <div style="font-size:11px;color:var(--muted)">Room booking summary CSV</div>
          </div>
          <button class="btn btn-success">⬇ CSV</button>
        </div>
      </div>

  
      <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
        <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:14px;font-size:14px">Select Section to Export</div>
        <div class="section-tabs">
          <button class="tab active">All</button>
          <button class="tab">A</button>
          <button class="tab">B</button>
          <button class="tab">C</button>
          <button class="tab">D</button>
          <button class="tab">E</button>
          <button class="tab">F</button>
          <button class="tab">G</button>
          <button class="tab">H</button>
        </div>
        <button class="btn btn-primary" style="margin-top:8px">⬇ Export Selected</button>
      </div>

    </div>
  </div>

</div>
