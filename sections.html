<!-- ── SECTIONS PAGE ── -->
<div id="page-sections" class="page">

  <!-- Add Section Form -->
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-header"><span class="panel-title">Add Section</span></div>
    <div class="panel-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Section ID</label>
          <input placeholder="e.g. I">
        </div>
        <div class="form-group">
          <label>Student Count</label>
          <input type="number" placeholder="60">
        </div>
      </div>
      <div style="margin-top:16px">
        <button class="btn btn-primary">+ Add Section</button>
      </div>
    </div>
  </div>

  <!-- Section Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Section A</div>
      <div class="stat-value" style="font-size:20px">60</div>
      <div class="stat-sub">Students</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Section B</div>
      <div class="stat-value" style="font-size:20px">60</div>
      <div class="stat-sub">Students</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Section C</div>
      <div class="stat-value" style="font-size:20px">58</div>
      <div class="stat-sub">Students</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Section D–H</div>
      <div class="stat-value" style="font-size:20px">5×</div>
      <div class="stat-sub">60 students avg</div>
    </div>
  </div>

</div>
